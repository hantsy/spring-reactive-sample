name: boot-data-elasticsearch

on:
  push:
    paths:
      - "boot-data-elasticsearch/**"
    branches: [ master ]
  pull_request:
    paths:
      - "boot-data-elasticsearch/**"
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build:

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boot-data-elasticsearch

    steps:
    - uses: actions/checkout@v7
      with:
          fetch-depth: 0
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'
    - name: Build with Maven
      run: ./mvnw -B package --file pom.xml

