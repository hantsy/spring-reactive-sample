name: spring-reactive-boot-mvc-freemarker

on:
  push:
    paths:
      - "boot-mvc-freemarker/**"
    branches: [ master ]
  pull_request:
    paths:
      - "boot-mvc-freemarker/**"
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build:

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boot-mvc-freemarker

    steps:
    - uses: actions/checkout@v6
      with:
          fetch-depth: 0
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    - name: Build with Maven
      run: ./mvnw -B package --file pom.xml
